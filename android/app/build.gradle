plugins {
    id "com.android.application"
    id "dev.flutter.flutter-gradle-plugin"
}

// Firebase (push notifications). Applied only when the configuration file
// downloaded from the Firebase console is present, so the project still
// builds on a machine without it (Firebase is then disabled at runtime).
if (file('google-services.json').exists()) {
    apply plugin: 'com.google.gms.google-services'
} else {
    logger.warn("google-services.json not found in android/app, Firebase (push notifications) will be disabled in this build")
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    compileSdk 36

    defaultConfig {
        applicationId "net.ccteam"
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion 36
        multiDexEnabled true
        versionCode flutter.versionCode
        versionName flutter.versionName
        testInstrumentationRunner "android.support.test.runner.AndroidJUnitRunner"
        // Required when setting minSdkVersion to 20 or lower
        multiDexEnabled true
    }

    compileOptions {
        // Flag to enable support for the new language APIs
        coreLibraryDesugaringEnabled true
        // Sets Java compatibility to Java 17
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    signingConfigs {
        release {
            keyAlias keystoreProperties['keyAlias']
            keyPassword keystoreProperties['keyPassword']
            storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
            storePassword keystoreProperties['storePassword']
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
        }
    }

    namespace 'net.ccteam'

    lint {
        disable 'InvalidPackage'
    }

    ndkVersion = "28.2.13676358" // required by integration_test plugin
}

flutter {
    source '../..'
}

dependencies {
    // For AGP 7.4+
    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'com.android.support.test:runner:1.0.2'
    androidTestImplementation 'com.android.support.test.espresso:espresso-core:3.0.2'
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.5' // required by flutter_local_notifications package
    implementation("com.google.android.material:material:1.13.0")
    implementation "androidx.multidex:multidex:2.0.1"
}
