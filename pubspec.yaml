name: chachatte_team
description: Flutter application for Chachatte team motoclub

dependencies:
  flutter:
    sdk: flutter

  # for dates localization
  flutter_localizations:
    sdk: flutter

  # State management
  provider: ^6.0.5

  # Logging
  logging: ^1.1.1

  # Provides internationalization and localization
  intl: ^0.17.0

  # Future-based library for making HTTP requests
  http: ^0.13.5

  # GraphQL integration
  graphql_flutter: ^5.1.2

  # Load and cache network images
  cached_network_image: ^3.2.3

  # To open a URL
  url_launcher: ^6.1.9

  # Access to shared preferences
  shared_preferences: ^2.0.17

  # for picking images from the image library
  image_picker: ^0.8.6+2

  # cropping images
  simple_image_crop:
    git:
      url: https://github.com/Yann39/flutter_simple_image_crop.git

  # Markdown text interpreter
  flutter_markdown: ^0.6.14

  # to display notifications
  flutter_local_notifications: ^13.0.0

  # to share content
  share: ^2.0.4

  # mocking
  mockito: ^5.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # Enables the `pub run build_runner` command
  #build_runner: ^1.5.1
  # Includes the JavaScript compilers
  #build_web_compilers: ^2.1.0

#dependency_overrides:
  #flutter_web:
    #git:
      #url: https://github.com/flutter/flutter_web
      #path: packages/flutter_web
  #flutter_web_ui:
    #git:
      #url: https://github.com/flutter/flutter_web
      #path: packages/flutter_web_ui

# For information on the generic Dart part of this file, see the
# following page: https://www.dartlang.org/tools/pub/pubspec

# The following section is specific to Flutter.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true
  assets:
    - images/chachatte-team-banner.png
    - images/chachatte-team-banner-drawer.png
    - images/motos.jpg
    - images/finish_flag.png

  # To add assets to your application, add an assets section, like this:
  # assets:
  #  - images/a_dot_burr.jpeg
  #  - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.io/assets-and-images/#resolution-aware.

  # For details regarding adding assets from package dependencies, see
  # https://flutter.io/assets-and-images/#from-packages

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies, 
  # see https://flutter.io/custom-fonts/#from-packages
  fonts:
    - family: Barbatrick
      fonts:
        - asset: fonts/barbatrick.regular.ttf
    - family: AlarmClock
      fonts:
        - asset: fonts/alarmclock.ttf
    - family: CustomIcons
      fonts:
        - asset: fonts/CustomIcons.ttf

environment:
  sdk: '>=2.10.0 <3.0.0'