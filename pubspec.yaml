name: ccteam
description: Flutter application for CCTeam motoclub

environment:
  sdk: ^3.11.0

dependencies:
  # Required for every Flutter project
  flutter:
    sdk: flutter

  # Required to enable localization
  flutter_localizations:
    sdk: flutter

  # State management
  provider: ^6.1.5

  # Logging
  logging: ^1.3.0

  # Provides internationalization and localization
  intl: ^0.20.2

  # Future-based library for making HTTP requests
  http: ^1.6.0

  # GraphQL integration
  graphql_flutter: ^5.3.0

  # Load and cache network images
  cached_network_image: ^3.4.1

  # To open a URL
  url_launcher: ^6.3.2

  # Access to shared preferences
  shared_preferences: ^2.5.5

  # for picking images from the image library
  image_picker: ^1.2.2

  # to render SVG
  flutter_svg: ^2.2.4

  # cropping images
  crop_your_image: ^2.0.0

  # Markdown text interpreter
  flutter_markdown_plus: ^1.0.7

  # to display notifications
  flutter_local_notifications: ^21.0.0

  # to share content
  share_plus: ^13.1.0

  # handle timezones
  timezone: ^0.11.0

  # mocking
  mockito: ^5.5.1

  gql: any
  path: any

dev_dependencies:

  # Required for a Flutter project that includes tests
  flutter_test:
    sdk: flutter

  # Required for a Flutter project that includes integration tests
  integration_test:
    sdk: flutter

  # Contains a set of recommended lints for Flutter code
  flutter_lints: ^6.0.0

# The following section is specific to Flutter.
flutter:

  # Required if you use the Material icon font
  uses-material-design: true

  # Enables generation of localized strings from arb files
  generate: true

  # Lists assets, such as image files
  assets:
    - images/ccteam-logo.png
    - images/ccteam-logo1.png
    - images/ccteam6.png
    - images/ccteam8.png
    - images/ccteam-banner-drawer.png
    - images/motos.jpg
    - images/tracks/
    - images/manufacturers/

  # Required if your app uses custom fonts
  fonts:
    - family: AlarmClock
      fonts:
        - asset: fonts/alarmclock.ttf
    - family: CustomIcons
      fonts:
        - asset: fonts/CustomIcons.ttf