name: ccteam
description: Flutter application for CCTeam motoclub

dependencies:
  flutter:
    sdk: flutter

  # for dates localization
  flutter_localizations:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Logging
  logging: ^1.2.0

  # Provides internationalization and localization
  intl: ^0.18.1

  # Future-based library for making HTTP requests
  http: ^1.2.1

  # GraphQL integration
  graphql_flutter: ^5.1.2

  # Load and cache network images
  cached_network_image: ^3.3.1

  # To open a URL
  url_launcher: ^6.2.5

  # Access to shared preferences
  shared_preferences: ^2.2.2

  # for picking images from the image library
  image_picker: ^1.1.0

  # to render SVG
  flutter_svg: ^2.0.10+1

  # cropping images
  crop_your_image: ^1.0.2

  # Markdown text interpreter
  flutter_markdown: ^0.6.22

  # to display notifications
  flutter_local_notifications: ^17.0.0

  # to share content
  share: ^2.0.4

  # mocking
  mockito: ^5.3.2

  gql: any
  path: any
dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # Enables the `pub run build_runner` command
  #build_runner: ^1.5.1
  # Includes the JavaScript compilers
  #build_web_compilers: ^2.1.0

#dependency_overrides:
  #flutter_web:
    #git:
      #url: https://github.com/flutter/flutter_web
      #path: packages/flutter_web
  #flutter_web_ui:
    #git:
      #url: https://github.com/flutter/flutter_web
      #path: packages/flutter_web_ui

# For information on the generic Dart part of this file, see the
# following page: https://www.dartlang.org/tools/pub/pubspec

# The following section is specific to Flutter.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true
  assets:
    - images/ccteam-banner.png
    - images/ccteam-banner2.png
    - images/ccteam-banner3.png
    - images/ccteam-banner4.png
    - images/ccteam-logo.png
    - images/ccteam-logo1.png
    - images/ccteam-banner-drawer.png
    - images/motos.jpg
    - images/finish_flag.png
    - images/tracks/ales_cover.jpg
    - images/tracks/bourbonnais_cover.jpg
    - images/tracks/bresse_cover.jpg
    - images/tracks/carole_cover.jpg
    - images/tracks/dijon_cover.jpg
    - images/tracks/la_ferte_gaucher_cover.jpg
    - images/tracks/le_mans_cover.jpg
    - images/tracks/ledenon_cover.jpg
    - images/tracks/magny_cours_cover.jpg
    - images/tracks/vaison_cover.jpg

  # To add assets to your application, add an assets section, like this:
  # assets:
  #  - images/a_dot_burr.jpeg
  #  - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.io/assets-and-images/#resolution-aware.

  # For details regarding adding assets from package dependencies, see
  # https://flutter.io/assets-and-images/#from-packages

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies, 
  # see https://flutter.io/custom-fonts/#from-packages
  fonts:
    - family: Barbatrick
      fonts:
        - asset: fonts/barbatrick.regular.ttf
    - family: AlarmClock
      fonts:
        - asset: fonts/alarmclock.ttf
    - family: CustomIcons
      fonts:
        - asset: fonts/CustomIcons.ttf

environment:
  sdk: '>=3.0.0 <4.0.0'