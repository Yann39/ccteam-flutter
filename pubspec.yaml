name: ccteam
description: Flutter application for CCTeam motoclub

environment:
  sdk: ^3.7.2

dependencies:
  # Required for every Flutter project
  flutter:
    sdk: flutter

  # Required to enable localization
  flutter_localizations:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Logging
  logging: ^1.2.0

  # Provides internationalization and localization
  intl: ^0.19.0

  # Future-based library for making HTTP requests
  http: ^1.2.1

  # GraphQL integration
  graphql_flutter: ^5.1.2

  # Load and cache network images
  cached_network_image: ^3.3.1

  # To open a URL
  url_launcher: ^6.2.5

  # Access to shared preferences
  shared_preferences: ^2.2.2

  # for picking images from the image library
  image_picker: ^1.1.0

  # to render SVG
  flutter_svg: ^2.0.10+1

  # cropping images
  crop_your_image: ^2.0.0

  # Markdown text interpreter
  flutter_markdown: ^0.7.6+2

  # to display notifications
  flutter_local_notifications: ^18.0.1

  # to share content
  share_plus: ^10.1.4

  # mocking
  mockito: ^5.3.2

  gql: any
  path: any

dev_dependencies:

  # Required for a Flutter project that includes tests
  flutter_test:
    sdk: flutter

  # Required for a Flutter project that includes integration tests
  integration_test:
    sdk: flutter

  # Contains a set of recommended lints for Flutter code
  flutter_lints: ^5.0.0

# The following section is specific to Flutter.
flutter:

  # Required if you use the Material icon font
  uses-material-design: true

  # Enables generation of localized strings from arb files
  generate: true

  # Lists assets, such as image files
  assets:
    - images/ccteam-banner.png
    - images/ccteam-banner2.png
    - images/ccteam-banner3.png
    - images/ccteam-banner4.png
    - images/ccteam-logo.png
    - images/ccteam-logo1.png
    - images/ccteam6.png
    - images/ccteam8.png
    - images/ccteam-banner-drawer.png
    - images/motos.jpg
    - images/finish_flag.png
    - images/tracks/ales_cover.jpg
    - images/tracks/bourbonnais_cover.jpg
    - images/tracks/bresse_cover.jpg
    - images/tracks/carole_cover.jpg
    - images/tracks/dijon_cover.jpg
    - images/tracks/la_ferte_gaucher_cover.jpg
    - images/tracks/le_mans_cover.jpg
    - images/tracks/ledenon_cover.jpg
    - images/tracks/magny_cours_cover.jpg
    - images/tracks/vaison_cover.jpg

  # Required if your app uses custom fonts
  fonts:
    - family: Barbatrick
      fonts:
        - asset: fonts/barbatrick.regular.ttf
    - family: AlarmClock
      fonts:
        - asset: fonts/alarmclock.ttf
    - family: CustomIcons
      fonts:
        - asset: fonts/CustomIcons.ttf