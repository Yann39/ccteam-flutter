name: ccteam
description: Flutter application for CCTeam moto club

# Android build used in android/app/build.gradle (drives the Play Store + Android system settings)
version: 1.0.2+7

environment:
  sdk: ^3.11.0

dependencies:
  # Required for every Flutter project
  flutter:
    sdk: flutter

  # Required to enable localization
  flutter_localizations:
    sdk: flutter

  # State management
  provider: ^6.1.5

  # Logging
  logging: ^1.3.0

  # Provides internationalization and localization
  intl: ^0.20.2

  # Future-based library for making HTTP requests
  http: ^1.6.0

  # GraphQL integration
  graphql_flutter: ^5.3.0

  # Load and cache network images
  cached_network_image: ^3.4.1

  # To open a URL
  url_launcher: ^6.3.2

  # Charts (pie / bar / line)
  fl_chart: ^1.2.0

  # Expose the current app version at runtime
  package_info_plus: ^10.1.0

  # Access to shared preferences
  shared_preferences: ^2.5.5

  # For picking images from the image library
  image_picker: ^1.2.2

  # To render SVG
  flutter_svg: ^2.2.4

  # Cropping images
  crop_your_image: ^2.0.0

  # Markdown text interpreter
  flutter_markdown_plus: ^1.0.7

  # To share content
  share_plus: ^13.1.0

  # Handle timezones
  timezone: ^0.11.0

  # Mocking
  mockito: ^5.5.1

  # Firebase core + Cloud Messaging (push notifications)
  firebase_core: ^4.10.0
  firebase_messaging: ^16.3.0

  gql: any
  path: any

dev_dependencies:

  # Required for a Flutter project that includes tests
  flutter_test:
    sdk: flutter

  # Required for a Flutter project that includes integration tests
  integration_test:
    sdk: flutter

  # Contains a set of recommended lints for Flutter code
  flutter_lints: ^6.0.0

# The following section is specific to Flutter.
flutter:

  # Required if you use the Material icon font
  uses-material-design: true

  # Enables generation of localized strings from arb files
  generate: true

  # Lists assets, such as image files
  assets:
    - images/app_logos/
    - images/tracks/
    - images/manufacturers/

  # Required if your app uses custom fonts
  fonts:
    - family: AlarmClock
      fonts:
        - asset: fonts/alarmclock.ttf
    - family: CustomIcons
      fonts:
        - asset: fonts/CustomIcons.ttf